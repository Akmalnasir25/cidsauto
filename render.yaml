services:
  - type: web
    name: cidsauto
    env: docker
    dockerfilePath: ./Dockerfile
    buildCommand: ""
    startCommand: ""
    envVars:
      - key: HEADLESS
        value: "true"
      - key: NODE_ENV
        value: production
      - key: ACTIVE_PROFILE
        value: Akmal
      - key: PYTHONUNBUFFERED
        value: "1"

